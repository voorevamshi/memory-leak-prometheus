spring.application.name=memory-leak-prometheus
# Increase logging to see memory issues clearly
logging.level.org.springframework.web=DEBUG

# Expose both the raw metrics, prometheus-formatted metrics, and heapdump
management.endpoint.heapdump.enabled=true
management.endpoints.web.exposure.include=heapdump,health,info,metrics,prometheus

# Optional: Add a tag to identify this specific microservice in your dashboard
management.metrics.tags.application=leak-demo-service

feature.rate-limiter.enabled=true